name: CI/CD Build and Deploy to On-Premise K8s

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./fly-labour-backend
          file: ./fly-labour-backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fly-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./fly-labour-frontend
          file: ./fly-labour-frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fly-frontend:latest
          build-args: |
            VITE_API_URL=http://flyimmigration.local/api

  deploy-to-k8s:
    needs: build-and-push
    runs-on: k8s-runner
    steps:
      - name: Verify K8s Connection
        run: kubectl cluster-info

      - name: Deploy to Cluster
        run: |
          # Kiểm tra thư mục trước khi chạy
          ls -l $HOME/k8s-manifests/
          kubectl apply -f $HOME/k8s-manifests/env-configmap.yaml
          kubectl apply -f $HOME/k8s-manifests/env-secret.yaml
          kubectl apply -f $HOME/k8s-manifests/apps.yaml

      - name: Rollout Restart Deployment
        run: |
          kubectl rollout restart deployment fly-backend
          kubectl rollout restart deployment fly-frontend